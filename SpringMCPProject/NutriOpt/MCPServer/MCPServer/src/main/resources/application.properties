spring.application.name=MCPServer

# MariaDB config
spring.datasource.url=jdbc:mariadb://localhost:3306/nutriopt_db
spring.datasource.username=****
spring.datasource.password=****
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.connection-timeout=5000

# JPA config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Spring AI MCP Server config
spring.ai.mcp.server.name=nutriopt-mcp-server
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.stdio=true

# Required for STDIO MCP
spring.main.web-application-type=none
spring.main.banner-mode=off

# Keep STDIO clean
logging.level.root=OFF

# OpenFoodFacts API config
nutriopt.openfoodfacts.base-url=https://world.openfoodfacts.org
nutriopt.openfoodfacts.user-agent=NutriOpt/1.0