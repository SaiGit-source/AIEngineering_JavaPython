server.port=8085

spring.application.name=NutriOptAgent

# ===============================
# OpenAI / ChatClient
# ===============================
spring.ai.openai.api-key=Your_OpenAI_API_Key_Here
spring.ai.openai.chat.options.model=gpt-4o-mini

# ===============================
# MariaDB Conversation History
# ===============================
spring.datasource.url=jdbc:mariadb://localhost:3306/nutriopt_db
spring.datasource.username=*****
spring.datasource.password=*****
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.hikari.connection-timeout=5000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# ===============================
# Spring AI MCP Client
# ===============================
spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.name=nutriopt-agent-mcp-client
spring.ai.mcp.client.version=0.0.1
spring.ai.mcp.client.initialized=true
spring.ai.mcp.client.request-timeout=90s
spring.ai.mcp.client.type=SYNC

# Load MCP server definitions from JSON file
spring.ai.mcp.client.stdio.servers-configuration=classpath:mcp-servers.json

# ===============================
# Logging
# ===============================
logging.level.root=INFO